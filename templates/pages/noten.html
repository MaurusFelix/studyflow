{% extends "base.html" %}
{% block title %}Noten{% endblock %}
{% block page_title %}Noten{% endblock %}
{% block topbar_actions %}
  <button class="btn btn-s btn-sm" onclick="openAddFach()">
    <svg width="13" height="13" style="stroke:currentColor;fill:none;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round"><use href="#ic-plus"/></svg>
    Fach
  </button>
  <button class="btn btn-p btn-sm" onclick="openAddNote()">
    <svg width="13" height="13" style="stroke:currentColor;fill:none;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round"><use href="#ic-plus"/></svg>
    Note
  </button>
{% endblock %}
{% block content %}
<div id="noten-list"><div class="empty"><div class="empty-icon">📝</div><h3>Lade...</h3></div></div>
{% endblock %}
{% block scripts %}<script src="/static/js/noten.js"></script>{% endblock %}
